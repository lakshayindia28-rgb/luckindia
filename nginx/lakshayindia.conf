# Nginx site config
# HTTP block — certbot will add HTTPS blocks automatically after SSL setup.
# Save as: /etc/nginx/sites-available/lakshayindia

# Security headers map (applied in both HTTP and HTTPS blocks)
map $sent_http_content_type $csp_header {
  default "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';";
}

server {
  listen 80 default_server;
  server_name lakshayindia.biz www.lakshayindia.biz;

  # Security headers
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
  add_header Content-Security-Policy $csp_header always;

  # Hide server version
  server_tokens off;

  # React build output
  root /var/www/lakshayindia;
  index index.html;

  # Static assets — long cache
  location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  location /api/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Prevent response buffering issues
    proxy_buffering off;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
